name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Stopping and removing existing container..."
            docker stop devops-dashboard || true
            docker rm devops-dashboard || true

            echo "Pulling latest image from Docker Hub..."
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest

            echo "Starting new container..."
            docker run \
              -d \
              --name devops-dashboard \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest

            echo "Deployment completed successfully!"
            docker ps -a | grep devops-dashboard
