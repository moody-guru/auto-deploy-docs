name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            # Stop and remove existing container if running on port 80
            echo "Stopping and removing existing container..."
            docker stop devops-dashboard || true
            docker rm devops-dashboard || true

            # Pull the latest image from Docker Hub
            echo "Pulling latest image from Docker Hub..."
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest

            # Run the new container detached on port 80
            echo "Starting new container..."
            docker run \
              -d \
              --name devops-dashboard \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest

            echo "Deployment completed successfully!"
            docker ps -a | grep devops-dashboard