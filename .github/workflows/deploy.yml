name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest,${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            docker stop devops-dashboard || true
            docker rm devops-dashboard || true
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest
            docker run -d -p 80:80 --name devops-dashboard --restart always ${{ secrets.DOCKER_HUB_USERNAME }}/devops-dashboard:latest
            docker ps | grep devops-dashboard